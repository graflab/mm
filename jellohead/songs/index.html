<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Songbook - Marv Moses Is Jellohead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --ink: #2a2014;
      --ink-soft: #4a3a25;
      --muted: #7a6a52;
      --paper: #f1e4c9;
      --paper-edge: #d8c7a4;
      --paper-shadow: #b9a47c;
      --accent: #8a1a12;
      --line: #b9a47c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #181818 0%, var(--bg) 55%);
      color: #d8cbb4;
      font-family: "Cormorant Garamond", serif;
      padding: 1.5rem 1rem 2.5rem;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-link {
      display: inline-block;
      margin-bottom: 0.6rem;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .logo-link:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 14px rgba(218, 41, 28, 0.45));
    }

    .logo-link img {
      width: 22vw;
      max-width: 110px;
      display: block;
    }

    h1.page-title {
      margin: 0.3rem 0 0;
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e3d8c6;
    }

    /* Book */
    .book-stage {
      perspective: 2000px;
      padding: 1rem 0;
    }

    .book {
      position: relative;
      margin: 0 auto;
      width: 100%;
      max-width: 760px;
      aspect-ratio: 3 / 4;
      border-radius: 6px 10px 10px 6px;
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(0, 0, 0, 0.4);
      background:
        linear-gradient(90deg, #5b3a1d 0%, #3a2412 4%, #5b3a1d 8%, #6b4524 12%) left/12px 100% no-repeat,
        var(--paper);
      transform-style: preserve-3d;
    }

    .page {
      position: absolute;
      inset: 0 0 0 12px;
      background:
        radial-gradient(ellipse at 0% 50%, rgba(0,0,0,0.18) 0%, transparent 12%),
        repeating-linear-gradient(
          to bottom,
          rgba(155, 130, 90, 0.04) 0px,
          rgba(155, 130, 90, 0.04) 2px,
          transparent 2px,
          transparent 6px
        ),
        linear-gradient(180deg, #f3e7cd 0%, var(--paper) 60%, var(--paper-edge) 100%);
      color: var(--ink);
      padding: clamp(1.2rem, 4vw, 2.4rem) clamp(1.4rem, 5vw, 3rem) clamp(2.2rem, 5vw, 3rem);
      border-radius: 0 8px 8px 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform-origin: left center;
      backface-visibility: hidden;
      box-shadow: inset 8px 0 16px -8px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      transform: rotateY(0deg);
      transition: transform 0.7s cubic-bezier(0.65, 0.05, 0.35, 1), opacity 0.3s ease;
      will-change: transform, opacity;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }

    .page.flipping-forward {
      opacity: 1;
      z-index: 3;
      animation: flipForward 0.7s cubic-bezier(0.65, 0.05, 0.35, 1) forwards;
    }

    .page.flipping-back {
      opacity: 1;
      z-index: 3;
      animation: flipBack 0.7s cubic-bezier(0.65, 0.05, 0.35, 1) forwards;
    }

    @keyframes flipForward {
      0%   { transform: rotateY(0deg);    box-shadow: inset 8px 0 16px -8px rgba(0,0,0,0.35); }
      100% { transform: rotateY(-180deg); box-shadow: inset -8px 0 16px -8px rgba(0,0,0,0.35); }
    }

    @keyframes flipBack {
      0%   { transform: rotateY(-180deg); }
      100% { transform: rotateY(0deg);    }
    }

    /* Page content */
    .page-content {
      flex: 1 1 auto;
      overflow-y: auto;
      padding-right: 0.4rem;
      scrollbar-width: thin;
      scrollbar-color: var(--paper-shadow) transparent;
    }

    .page-content::-webkit-scrollbar { width: 8px; }
    .page-content::-webkit-scrollbar-thumb {
      background: var(--paper-shadow);
      border-radius: 4px;
    }

    .page-number {
      position: absolute;
      bottom: 0.8rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Roboto Condensed", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Cover page */
    .page.cover {
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(ellipse at center, rgba(218, 41, 28, 0.08) 0%, transparent 60%),
        linear-gradient(180deg, #efe1c3 0%, #d9c69d 100%);
    }

    .cover-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 700;
      font-size: clamp(2.2rem, 7vw, 4rem);
      letter-spacing: 0.05em;
      color: var(--ink);
      margin: 0 0 0.4rem;
    }

    .cover-rule {
      width: 60%;
      height: 1px;
      background: var(--ink-soft);
      margin: 0.6rem auto 1rem;
      opacity: 0.6;
    }

    .cover-sub {
      font-family: "Roboto Condensed", sans-serif;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-size: 0.85rem;
      color: var(--ink-soft);
    }

    /* TOC */
    .toc-title,
    .song-title {
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--ink);
      margin: 0 0 0.4rem;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .section-rule {
      width: 40%;
      height: 1px;
      background: var(--line);
      margin: 0.4rem auto 1.4rem;
    }

    .toc-list {
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      color: var(--ink);
    }

    .toc-list li {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      padding: 0.45rem 0;
      border-bottom: 1px dotted rgba(74, 58, 37, 0.35);
    }

    .toc-list a {
      color: var(--ink);
      text-decoration: none;
      transition: color 0.2s ease;
      flex: 0 0 auto;
      font-weight: 500;
    }

    .toc-list a:hover,
    .toc-list a:focus {
      color: var(--accent);
      outline: none;
    }

    .toc-leader {
      flex: 1 1 auto;
      border-bottom: 1px dotted rgba(74, 58, 37, 0.45);
      transform: translateY(-3px);
      margin: 0 0.3rem;
    }

    .toc-pagenum {
      flex: 0 0 auto;
      font-family: "Roboto Condensed", sans-serif;
      font-size: 0.95em;
      color: var(--ink-soft);
    }

    /* Song page */
    .lyrics {
      margin: 0;
      white-space: pre-wrap;
      color: var(--ink);
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      line-height: 1.55;
      font-family: "Cormorant Garamond", serif;
    }

    .loading-page {
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--ink-soft);
      font-family: "Roboto Condensed", sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Navigation */
    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin: 1.2rem auto 0;
      max-width: 760px;
    }

    .nav button {
      background: rgba(241, 228, 201, 0.08);
      color: #e3d8c6;
      border: 1px solid rgba(241, 228, 201, 0.35);
      font-family: "Roboto Condensed", sans-serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.8rem;
      padding: 0.6rem 1.1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .nav button:hover:not(:disabled) {
      background: rgba(218, 41, 28, 0.2);
      border-color: var(--accent);
      color: #fff;
    }

    .nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .nav .indicator {
      font-family: "Roboto Condensed", sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9f9380;
      min-width: 7rem;
      text-align: center;
    }

    .hint {
      text-align: center;
      margin: 0.8rem 0 0;
      color: #7a6a52;
      font-family: "Roboto Condensed", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      body { padding: 1rem 0.6rem 1.8rem; }
      .logo-link img { width: 30vw; }
      .book { aspect-ratio: 3 / 4.4; }
      .nav button { padding: 0.5rem 0.8rem; font-size: 0.72rem; }
      .nav { gap: 0.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page,
      .page.flipping-forward,
      .page.flipping-back {
        animation: none !important;
        transition: opacity 0.2s ease;
        transform: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="/jellohead" class="logo-link" aria-label="Back to home">
        <img src="/jellohead/logo.svg" alt="Marv Moses">
      </a>
      <h1 class="page-title">Songbook</h1>
    </header>

    <div class="book-stage">
      <div class="book" id="book" aria-live="polite">
        <div class="page loading-page active" id="loading-page">
          <div>Loading songbook…</div>
        </div>
      </div>
    </div>

    <nav class="nav" aria-label="Songbook navigation">
      <button type="button" id="prev-btn" aria-label="Previous page" disabled>‹ Prev</button>
      <span class="indicator" id="indicator">— / —</span>
      <button type="button" id="next-btn" aria-label="Next page" disabled>Next ›</button>
    </nav>
    <p class="hint">Use the buttons or ← → keys to turn the pages</p>
  </div>

  <script>
    const songs = [
      { title: "A Fire Inside", file: "A_Fire_Inside.txt" },
      { title: "Come Back Down", file: "Come_Back_Down.txt" },
      { title: "Greasy Sun", file: "Greasy_Sun.txt" },
      { title: "Halifax", file: "Halifax.txt" },
      { title: "Sagebrush", file: "Sagebrush.txt" },
      { title: "Sunrise", file: "Sunrise.txt" },
      { title: "Take Two", file: "Take_Two.txt" },
      { title: "Tired Twin", file: "Tired_Twin.txt" },
      { title: "Well Dad", file: "Well_Dad.txt" }
    ];

    const book = document.getElementById("book");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const indicator = document.getElementById("indicator");

    let pages = [];          // Array of page DOM elements (in order)
    let currentIndex = 0;
    let isFlipping = false;

    function createPage(extraClass) {
      const page = document.createElement("section");
      page.className = "page" + (extraClass ? " " + extraClass : "");
      return page;
    }

    function buildCoverPage() {
      const page = createPage("cover");
      page.innerHTML = `
        <div class="page-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <h2 class="cover-title">Songbook</h2>
          <div class="cover-rule"></div>
          <div class="cover-sub">Marv Moses Is Jellohead</div>
        </div>
      `;
      return page;
    }

    function buildTocPage(songEntries) {
      const page = createPage("toc");
      const list = songEntries.map((entry, idx) => {
        // Song pages start at index 2 (0=cover, 1=toc). Page numbers (book) start at 1.
        const songPageIndex = 2 + idx;
        const displayPageNum = songPageIndex + 1;
        return `
          <li>
            <a href="#" data-page-index="${songPageIndex}">${entry.title}</a>
            <span class="toc-leader" aria-hidden="true"></span>
            <span class="toc-pagenum">${displayPageNum}</span>
          </li>
        `;
      }).join("");
      page.innerHTML = `
        <div class="page-content">
          <h2 class="toc-title">Contents</h2>
          <div class="section-rule"></div>
          <ol class="toc-list">${list}</ol>
        </div>
        <div class="page-number">ii</div>
      `;
      return page;
    }

    function buildSongPage(title, lyrics, pageNum) {
      const page = createPage("song");
      const safeTitle = document.createElement("h2");
      safeTitle.className = "song-title";
      safeTitle.textContent = title;

      const rule = document.createElement("div");
      rule.className = "section-rule";

      const pre = document.createElement("pre");
      pre.className = "lyrics";
      pre.textContent = lyrics;

      const content = document.createElement("div");
      content.className = "page-content";
      content.appendChild(safeTitle);
      content.appendChild(rule);
      content.appendChild(pre);

      const num = document.createElement("div");
      num.className = "page-number";
      num.textContent = pageNum;

      page.appendChild(content);
      page.appendChild(num);
      return page;
    }

    function buildErrorPage(title, pageNum) {
      const page = createPage("song");

      const content = document.createElement("div");
      content.className = "page-content";
      content.style.display = "flex";
      content.style.flexDirection = "column";
      content.style.alignItems = "center";
      content.style.justifyContent = "center";
      content.style.textAlign = "center";

      const heading = document.createElement("h2");
      heading.className = "song-title";
      heading.textContent = title;

      const rule = document.createElement("div");
      rule.className = "section-rule";

      const msg = document.createElement("p");
      msg.textContent = "Lyrics unavailable right now.";
      msg.style.cssText = "color: var(--accent); font-family: 'Roboto Condensed', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.85rem;";

      content.appendChild(heading);
      content.appendChild(rule);
      content.appendChild(msg);

      const num = document.createElement("div");
      num.className = "page-number";
      num.textContent = pageNum;

      page.appendChild(content);
      page.appendChild(num);
      return page;
    }

    function updateIndicator() {
      const total = pages.length;
      indicator.textContent = `${currentIndex + 1} / ${total}`;
      prevBtn.disabled = currentIndex <= 0 || isFlipping;
      nextBtn.disabled = currentIndex >= total - 1 || isFlipping;
    }

    function showPage(index, direction) {
      if (index < 0 || index >= pages.length) return;
      if (index === currentIndex) return;

      const current = pages[currentIndex];
      const target = pages[index];

      // Reduced-motion: skip animation
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) {
        current.classList.remove("active");
        target.classList.add("active");
        currentIndex = index;
        updateIndicator();
        return;
      }

      isFlipping = true;
      updateIndicator();

      if (direction === "forward") {
        // Current page flips out to the left, revealing target underneath.
        target.classList.add("active");
        current.classList.add("flipping-forward");
        const onEnd = () => {
          current.classList.remove("active", "flipping-forward");
          current.style.transform = "";
          currentIndex = index;
          isFlipping = false;
          updateIndicator();
          current.removeEventListener("animationend", onEnd);
        };
        current.addEventListener("animationend", onEnd);
      } else {
        // Backward: target flips in from the left over the current page.
        target.style.transform = "rotateY(-180deg)";
        target.classList.add("active", "flipping-back");
        const onEnd = () => {
          current.classList.remove("active");
          target.classList.remove("flipping-back");
          target.style.transform = "";
          currentIndex = index;
          isFlipping = false;
          updateIndicator();
          target.removeEventListener("animationend", onEnd);
        };
        target.addEventListener("animationend", onEnd);
      }
    }

    function goNext() {
      if (isFlipping) return;
      if (currentIndex < pages.length - 1) {
        showPage(currentIndex + 1, "forward");
      }
    }

    function goPrev() {
      if (isFlipping) return;
      if (currentIndex > 0) {
        showPage(currentIndex - 1, "backward");
      }
    }

    function goTo(index) {
      if (isFlipping) return;
      if (index === currentIndex) return;
      const direction = index > currentIndex ? "forward" : "backward";
      showPage(index, direction);
    }

    prevBtn.addEventListener("click", goPrev);
    nextBtn.addEventListener("click", goNext);

    document.addEventListener("keydown", (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === "ArrowRight" || e.key === "PageDown") {
        e.preventDefault();
        goNext();
      } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        goPrev();
      } else if (e.key === "Home") {
        e.preventDefault();
        goTo(0);
      } else if (e.key === "End") {
        e.preventDefault();
        goTo(pages.length - 1);
      }
    });

    async function loadSongbook() {
      const results = await Promise.allSettled(
        songs.map(async ({ title, file }) => {
          const safeFile = encodeURIComponent(file);
          const response = await fetch(`/assets/lyrics/${safeFile}`);
          if (!response.ok) {
            throw new Error(`Could not load ${file}: ${response.status} ${response.statusText}`);
          }
          const text = await response.text();
          return { title, lyrics: text };
        })
      );

      const loaded = results.map((result, idx) => {
        if (result.status === "fulfilled") {
          return { title: songs[idx].title, lyrics: result.value.lyrics, ok: true };
        }
        console.error("Songbook lyric load failure:", songs[idx].title, result.reason);
        return { title: songs[idx].title, lyrics: "", ok: false };
      });

      // Clear loading page
      book.textContent = "";
      pages = [];

      // Cover (page 1)
      pages.push(buildCoverPage());
      // TOC (page 2)
      pages.push(buildTocPage(loaded));
      // Song pages (page 3+)
      loaded.forEach((entry, idx) => {
        const pageNum = idx + 3;
        pages.push(entry.ok ? buildSongPage(entry.title, entry.lyrics, pageNum) : buildErrorPage(entry.title, pageNum));
      });

      pages.forEach((p) => book.appendChild(p));
      pages[0].classList.add("active");
      currentIndex = 0;
      updateIndicator();

      // TOC links
      book.addEventListener("click", (e) => {
        const link = e.target.closest("a[data-page-index]");
        if (!link) return;
        e.preventDefault();
        const idx = parseInt(link.getAttribute("data-page-index"), 10);
        if (Number.isInteger(idx) && idx >= 0 && idx < pages.length) goTo(idx);
      });
    }

    loadSongbook();
  </script>
</body>
</html>
